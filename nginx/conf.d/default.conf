server {
    listen 80;
    server_name wolfmother613.web.id sso.wolfmother613.web.id;
    
    # Avoid redirect loop if behind proxy (Cloudflare Flexible)
    # Better: Set Cloudflare SSL to "Full" or "Full (Strict)"
    return 301 https://$host$request_uri;
}

# SSO Service Subdomain
server {
    listen 443 ssl;
    server_name sso.wolfmother613.web.id;

    ssl_certificate /etc/nginx/ssl/server.pem;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    location / {
        proxy_pass http://sso:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Main API Service
server {
    listen 443 ssl;
    server_name wolfmother613.web.id;

    ssl_certificate /etc/nginx/ssl/server.pem;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # API Service & Main App (Handles /api/v1/..., /public/..., etc)
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
